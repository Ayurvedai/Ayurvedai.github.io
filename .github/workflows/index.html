<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.container{
    width:100%;
    max-width:1200px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.header{
    padding:25px 35px;
    border-bottom:1px solid rgba(255,255,255,.08);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{
    color:#fff;
    font-size:28px;
    font-weight:700;
}

.header p{
    color:#94a3b8;
    margin-top:6px;
    font-size:15px;
}

.badge{
    background:#2563eb;
    color:white;
    padding:8px 18px;
    border-radius:999px;
    font-size:14px;
    font-weight:600;
}

.viewer{
    padding:25px;
    background:#fff;
}

iframe{
    width:100%;
    height:80vh;
    border:none;
    border-radius:12px;
}

.footer{
    padding:18px;
    text-align:center;
    color:#94a3b8;
    font-size:14px;
    border-top:1px solid rgba(255,255,255,.08);
}

@media(max-width:768px){

.header{
    flex-direction:column;
    align-items:flex-start;
    gap:15px;
}

.header h1{
    font-size:22px;
}

iframe{
    height:70vh;
}

body{
    padding:15px;
}

}
</style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="header">
            <div>
                <h1>Embedded Document</h1>
                <p>Secure online viewer</p>
            </div>

            <div class="badge">
                Live Preview
            </div>
        </div>

        <div class="viewer">
            <iframe
                src="https://skpaste.com/X5rfdFo2XN/embed"
                loading="lazy">
            </iframe>
        </div>

        <div class="footer">
            © 2026 • Powered by SKPaste
        </div>

    </div>

</div>

</body>
</html>
